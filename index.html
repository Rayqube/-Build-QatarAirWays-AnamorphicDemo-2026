<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity Web Player | QatarAirWays-AnamorphicDemo-2026</title>
    <style>
      /* Reset margins and prevent scrolling */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #231F20;
      }

      /* Force canvas to fill the entire screen */
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        position: absolute;
        top: 0;
        left: 0;
        display: block;
      }

      /* Fullscreen Loading Overlay */
      #loading-overlay {
        position: fixed;
        inset: 0;
        background-color: #231F20;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: sans-serif;
        transition: opacity 0.5s ease;
      }

      /* Simple CSS Spinner */
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        border-top-color: #ffffff;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-text">Loading... 0%</div>
    </div>

    <canvas id="unity-canvas" tabindex="-1"></canvas>
    
    <script src="Build/-Build-QatarAirWays-AnamorphicDemo-2026.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loadingOverlay = document.querySelector("#loading-overlay");
      const loadingText = document.querySelector("#loading-text");

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/-Build-QatarAirWays-AnamorphicDemo-2026.data.gz",
        frameworkUrl: "Build/-Build-QatarAirWays-AnamorphicDemo-2026.framework.js.gz",
        codeUrl: "Build/-Build-QatarAirWays-AnamorphicDemo-2026.wasm.gz",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "QatarAirWays-AnamorphicDemo-2026",
        productVersion: "0.1.0",
        // matchWebGLToCanvasSize: false, 
        // devicePixelRatio: 1, 
      }, (progress) => {
        // This callback fires as the build downloads and initializes
        loadingText.innerText = `Loading... ${Math.round(progress * 100)}%`;
      }).then((unityInstance) => {
        // This triggers once the scene is fully rendered and ready
        loadingOverlay.style.opacity = "0";
        setTimeout(() => {
          loadingOverlay.style.display = "none";
        }, 500); // Matches the CSS transition duration
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
